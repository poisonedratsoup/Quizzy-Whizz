{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Whizz</title>
    <link rel="stylesheet" href="{% static 'processor/css/style.css' %}">
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>📚 My Library</h2>
            <button onclick="createNewFolder()" class="btn-new-folder">➕ New Folder</button>
        </div>
        <div id="libraryList">
            <p style="color: #bdc3c7; font-size: 0.9em; padding: 10px;">Loading library...</p>
        </div>
    </aside>

    <main class="main-content">
        <div id="activeFolderIndicator" class="active-banner" style="display:none;">
            📂 Active Folder: <span id="currentFolderName">None</span>
            <button onclick="clearActiveFolder()"
                style="background:transparent; color:#155724; border:1px solid #155724; padding:2px 8px; margin-left:10px; cursor:pointer; border-radius:4px;">Change</button>
        </div>

        <div class="card">
            <h1>Quizzy Whizz</h1>
            <p>Select a folder from the sidebar, then upload or paste content.</p>

            <textarea id="manualText" rows="5" placeholder="Paste your messy notes here..."></textarea>

            <div id="pageSelector"
                style="margin-bottom: 15px; display:none; background: #ebf5fb; padding: 15px; border-radius: 12px;">
                <div id="selectorHeader"></div>
                <p style="font-size: 0.9em; color: #555;">Select a batch to process:</p>
                <div id="batchContainer" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;"></div>
            </div>

            <div style="display: flex; align-items: center; justify-content: space-between;">
                <input type="file" id="fileInput" accept=".pdf,.docx,.pptx">
                <button onclick="processContent()" id="analyzeBtn">Analyze</button>
            </div>
        </div>

        <div id="errorBox"></div>
        <div id="lessonsResult"></div>
    </main>

    <div id="quizOverlay">
        <div class="quiz-container">
            <button onclick="closeQuiz()" style="position: absolute; right: 20px; top: 20px; background: #e74c3c;">✕
                Close</button>
            <h2 id="quizTitle"></h2>
            <div id="quizQuestions"></div>
            <div id="quizResults" style="margin-top: 20px; font-weight: bold; text-align: center;"></div>
        </div>
    </div>

    <script src="{% static 'processor/js/script.js' %}"></script>
</body>

</html>
